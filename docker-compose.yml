services:
  lanmao:
    build: .
    container_name: lanmao-articles
    ports:
      - "8080:80"
    volumes:
      - ./articles:/data/articles
      - ./articles.json:/data/articles.json
      - ./index.html:/data/index.html
    environment:
      - TZ=Asia/Shanghai
      - FETCH_INTERVAL=43200
    restart: unless-stopped
